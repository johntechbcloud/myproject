name: Trigger Google Cloud Build

on:
  push:
    branches:
      - main  # Triggers whenever you push to the main branch

jobs:
  deploy-to-azure-via-gcp:
    runs-on: ubuntu-latest
    
    # Required for Google Workload Identity
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 1: Authenticate with Google Cloud
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # Step 2: Set up gcloud CLI
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # Step 3: Submit the build to Google Cloud Build
      # We no longer pass _AZ_PASSWORD here because Cloud Build 
      # will pull it from Secret Manager automatically.
      - name: 'Run Cloud Build'
        run: |
          gcloud builds submit . \
            --config=cloudbuild.yaml