steps:
  # Step 1: Login to Azure using Service Principal
  - name: 'mcr.microsoft.com/azure-cli'
    id: 'Azure Login'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        az login --service-principal \
          -u $_AZ_APP_ID \
          -p $_AZ_PASSWORD \
          --tenant $_AZ_TENANT_ID

  # Step 2: Deploy the Bicep file
  - name: 'mcr.microsoft.com/azure-cli'
    id: 'Deploy Bicep'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        az deployment group create \
          --resource-group $_AZ_RESOURCE_GROUP \
          --template-file ./vnet.bicep \
          --parameters vnet.parameters.json

# Use substitutions to keep sensitive IDs out of the code
substitutions:
  _AZ_APP_ID: 'your-azure-app-id'
  _AZ_TENANT_ID: 'your-azure-tenant-id'
  _AZ_RESOURCE_GROUP: 'your-resource-group-name'

# Options to speed up the build
options:
  logging: CLOUD_LOGGING_ONLY